name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include code examples if helpful.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Orbital mechanics
        - Radiation environment
        - Fault injection
        - Fault tolerance (TMR)
        - Chip profiles
        - Visualization
        - Documentation
        - Other
    validations:
      required: true
